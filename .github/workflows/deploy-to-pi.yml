# deploy-to-pi.yml - Run Ansible playbook to deploy PBX to Raspberry Pi
# ---------------------------------------------------------------------
# This workflow is responsible for orchestrating deployments of the
# Asterisk/Twilio PBX to the Raspberry Pi using Ansible. It:
#   - Checks out the repository.
#   - Sets up Python and installs Ansible.
#   - Configures SSH access to the Pi using secrets.
#   - Runs the ansible/playbook-pbx.yml playbook against the inventory.

name: Deploy PBX to Raspberry Pi

on:
  workflow_dispatch:        # Allow manual runs from the GitHub Actions UI.
  push:
    branches:
      - main                # Optional: trigger deployment automatically on pushes to main.

jobs:
  deploy:
    name: Deploy to Raspberry Pi using Ansible
    runs-on: ubuntu-latest

    # We do not need special permissions here beyond reading the repo.
    permissions:
      contents: read

    steps:
      - name: Check out repository
        # Fetch the repository contents so that the Ansible playbook and
        # inventory are available on the runner.
        uses: actions/checkout@v4

      - name: Set up Python
        # Install a suitable version of Python on the runner so that we can
        # install and run Ansible.
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Ansible
        # Install Ansible via pip. For a small, self-contained workflow this is
        # sufficient. For more complex environments you might prefer a locked
        # requirements file.
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Configure SSH key for Ansible
        # Write the private SSH key from the repository secret into
        # ~/.ssh/id_rsa, restrict its permissions, and configure basic SSH
        # options to avoid host key prompts during automation.
        env:
          PI_SSH_PRIVATE_KEY: ${{ secrets.PI_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$PI_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Optionally, pre-populate known_hosts if you want strict host key
          # checking. Here we disable strict checking for simplicity, but you
          # may tighten this for production.
          echo "Host *" > ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Render inventory with secrets (optional override)
        # The inventory.ini uses placeholder values for PBX_PI_HOST and
        # PBX_PI_USER. Here we optionally override those using environment
        # variables derived from GitHub secrets. If you prefer to edit
        # inventory.ini directly and commit real values, you may remove this
        # step.
        env:
          PI_HOST: ${{ secrets.PI_HOST }}
          PI_USER: ${{ secrets.PI_USER }}
        run: |
          sed -i "s/PBX_PI_HOST/${PI_HOST}/g" ansible/inventory.ini
          sed -i "s/PBX_PI_USER/${PI_USER}/g" ansible/inventory.ini

      - name: Run Ansible playbook
        # Execute the PBX deployment playbook using the configured inventory.
        # The SSH key and host/user details are already in place from the
        # previous steps.
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/playbook-pbx.yml
