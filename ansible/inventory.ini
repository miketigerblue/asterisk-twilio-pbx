# inventory.ini - Ansible inventory for Raspberry Pi PBX deployment
# ---------------------------------------------------------------
# This inventory defines a single group, [pbx_pi], which contains the host
# representing your Raspberry Pi that will run the Asterisk/Twilio PBX.
#
# The host entry below uses placeholder values for the Pi's network address
# and is intended to be customised locally or overridden in CI.

[pbx_pi]
# Replace PBX_PI_HOST with the IP address or DNS name of your Raspberry Pi.
# The name `pbxpi` is an arbitrary inventory alias used within Ansible.
pbxpi ansible_host=your-pi-hostname.local

[pbx_pi:vars]
# The SSH username used to connect to the Pi. Replace with an appropriate
# user account (for example, `pi` on Raspberry Pi OS or a custom user you
# have created).
ansible_user=your_user
# Use an SSH private key for authentication. By default we reference
# ~/.ssh/id_rsa, which the GitHub Actions workflow will create from the
# PI_SSH_PRIVATE_KEY secret for CI/CD runs. When running Ansible from your Mac
# interactively, ensure that this path matches your actual key location.
ansible_ssh_private_key_file=~/.ssh/id_rsa


