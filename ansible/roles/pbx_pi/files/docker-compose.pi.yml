# docker-compose.pi.yml (Ansible copy) - Raspberry Pi deployment
# -------------------------------------------------------------
# This file mirrors compose/docker-compose.pi.yml from the project root and is
# stored under the role's files/ directory so that Ansible can copy it to the
# Raspberry Pi using the `copy` module. Keeping a copy here ensures that the
# Ansible role is self-contained and does not rely on the control machine
# having the project checked out in a specific path.

version: "3.9"

services:
  pbx:
    # Image reference
    # ---------------
    # The actual image name is injected at runtime by Ansible using group
    # variables (pbx_image). When this file is copied to the Pi, we expect to
    # manage the image tag via Ansible by updating the compose file or by
    # passing environment configuration alongside it.
    #
    # For simplicity and transparency, we retain the placeholder here and
    # expect you to keep it in sync with ansible/group_vars/pbx_pi.yml.
    image: ghcr.io/<OWNER>/asterisk-twilio-pbx:latest

    container_name: asterisk-twilio-pbx

    # Environment handling
    env_file:
      - .env

    # Configuration volumes (optional)
    # See compose/docker-compose.pi.yml for discussion. Here we keep the
    # configuration baked into the image by default.
    # volumes:
    #   - /opt/asterisk-twilio-pbx/asterisk:/etc/asterisk:ro

    # Port mappings
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5061:5061/tcp"
      - "10000-10100:10000-10100/udp"

    # Restart policy
    restart: unless-stopped
