[general]

; ==============================
; Bridge profiles
; ==============================

[default_bridge]
type=bridge
max_members=10
record_conference=no
; Optional: reduce weirdness for participants on hold
; (leave unset unless you see issues)
; internal_sample_rate=16000

; ==============================
; User profiles
; ==============================

[default_user]
type=user
music_on_hold_when_empty=yes
music_on_hold_class=default
announce_join_leave=yes
; Allow talk detection / UX tweaks later if you want:
; talk_detection_events=yes
; denoise=yes

[odin_user]
type=user
; ODIN shouldn't get join/leave announcements or MOH
announce_join_leave=no
music_on_hold_when_empty=no
; Helpful so ODIN isn't confused by DTMF/menu prompts
dtmf_passthrough=yes

; ==============================
; Menus (DTMF controls)
; ==============================

[default_menu]
type=menu
; 1 = toggle mute for the caller
*1=toggle_mute
; 2 = leave the conference cleanly
*2=leave_conference
