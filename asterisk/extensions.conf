; extensions.conf - Asterisk dialplan for Twilio outbound calling
; ---------------------------------------------------------------
; This dialplan defines an `outbound` context which is used for placing
; outbound calls via the Twilio SIP trunk defined in pjsip.conf.
; The dialplan includes:
;   - A specific pattern for Bermuda numbers, which start with country code
;     001441 followed by 6 subscriber digits.
;   - A broader international pattern for testing other destinations.
;   - Clear comments explaining each step in the call flow so that it is easy
;     to extend later (for example, to add authorisation, call recording,
;     time-of-day routing, etc.).

[general]
; General options for the dialplan. Kept minimal for clarity in this example.
; TODO: Add global features such as shared variables, includes, etc., as your
;       PBX grows in complexity.

[globals]
; Global variables can be defined here if needed. For example, you might
; define a global trunk name or a default outbound caller ID.
; TODO: Define globals such as TRUNK_TWILIO or DEFAULT_OUTBOUND_CID here
;       if they become useful.

; ------------------------------
; Internal dialling context
; ------------------------------
; The `internal` context is used by authenticated SIP devices such as the
; Groundwire softphone (extension 1001). From here, internal services (echo
; tests, voicemail, etc.) can be provided, and the outbound context can be
; included for external calls.

[internal]

; Simple echo test extension to verify that media flows correctly in both
; directions. Dial 6000 from extension 1001 to test audio locally without
; involving Twilio.
exten => 6000,1,NoOp(Echo test for extension 1001)
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()

; Allow internal phones to access the outbound dialplan (e.g. Twilio). In a
; larger system you might restrict this via PINs or separate contexts.
include => outbound

; ------------------------------
; ODIN voice agent (OpenAI via Twilio Media Streams)
; ------------------------------
; Dial 6346 on a LAN softphone to speak to the ODIN agent.
; Call flow: Groundwire -> Asterisk -> Twilio SIP Domain -> Twilio Function (/dial)
; -> <Connect><Stream> -> odin-realtime-bridge (Fly) -> OpenAI Realtime.
exten => 6346,1,NoOp(ODIN voice agent (OpenAI Realtime) - start)
 same => n,Dial(PJSIP/6346@twilio-endpoint)
 same => n,Hangup()

; RIZZY (nephew-friendly) persona
; Dial 7499 to talk to a more playful ODIN variant.
exten => 7499,1,NoOp(RIZZY voice agent (OpenAI Realtime) - start)
 same => n,Dial(PJSIP/7499@twilio-endpoint)
 same => n,Hangup()

; ------------------------------
; Outbound dialling context
; ------------------------------
; The `outbound` context is used by devices/extensions that are permitted to
; place external calls via Twilio. In a fuller PBX, you might have an
; `internal` context that includes `outbound` or requires a PIN.

[outbound]

; Twilio expects the called party in E.164 format in the Request-URI, i.e.
; "+<countrycode><nationalnumber>" (example: +14415551234).
;
; Because many softphones dial international numbers with a leading "00"
; prefix, we translate "00..." -> "+..." before sending the call to Twilio.
;
; Additionally, Twilio typically requires a valid caller ID (either a Twilio
; number on the account or a verified caller ID). You can provide that to the
; container via the optional environment variable TWILIO_CALLERID.

; Pattern: E.164 +...
; ------------------
exten => _+X.,1,NoOp(Calling E.164 via Twilio: ${EXTEN})
 same => n,Set(DIAL_NUMBER=${EXTEN})
 same => n,Gosub(set-callerid,s,1)
 same => n,Dial(PJSIP/${DIAL_NUMBER}@twilio-endpoint)
 same => n,Hangup()

; Pattern: International with 00 prefix
; -----------------------------------
exten => _00X.,1,NoOp(Calling international via Twilio (00-prefix): ${EXTEN})
 same => n,Set(DIAL_NUMBER=+${EXTEN:2})
 same => n,Gosub(set-callerid,s,1)
 same => n,Dial(PJSIP/${DIAL_NUMBER}@twilio-endpoint)
 same => n,Hangup()

; Subroutine: caller ID policy
; ----------------------------
[set-callerid]
exten => s,1,NoOp(Setting CallerID from env TWILIO_CALLERID (if set))
 same => n,Set(TWILIO_CID=${ENV(TWILIO_CALLERID)})
 same => n,ExecIf($[${LEN(${TWILIO_CID})} > 0]?Set(CALLERID(num)=${TWILIO_CID}))
 same => n,Return()

; TODO: Add additional contexts and patterns, for example:
