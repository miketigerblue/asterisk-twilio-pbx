; extensions.conf - Asterisk dialplan for LAN phones + Twilio outbound
; ------------------------------------------------------------------
; Supports:
;   - Internal feature codes (echo test, AI agents, conference)
;   - Controlled outbound PSTN calling via Twilio
;   - E.164 normalisation (+ and 00-prefix handling)
;   - Optional caller ID injection via environment variable
;
; Security posture:
;   - Only authenticated endpoints can reach [internal]
;   - Outbound is explicitly allow-listed
;   - Everything else is denied with logging

[general]
; Keep empty unless you need global dialplan behaviour later

[globals]
; Optional globals can live here later

; ===================================================================
; Internal context
; ===================================================================

[internal]

; -------------------------------------------------
; Internal extension-to-extension calling
; -------------------------------------------------
; Keep this in [internal] (not [outbound]) so internal calls never touch
; PSTN policy and remain predictable.
exten => _1XXX,1,NoOp(Internal call to ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; -------------------------------------------------
; Conference room
; -------------------------------------------------
exten => 7000,1,NoOp(Conference bridge 7000)
 same => n,Answer()
 same => n,ConfBridge(7000,default_bridge,default_user)
 same => n,Hangup()

; -------------------------------------------------
; Invite ODIN into conference 7000
; -------------------------------------------------
; This dials ODIN over the Twilio trunk, and on answer forces the called leg
; into ConfBridge(7000) using the U() subroutine.
exten => 7001,1,NoOp(Invite ODIN into conf 7000)
 same => n,Answer()
 same => n,Dial(PJSIP/6346@twilio-endpoint,60,gU(joinconf-odin^s^1))
 same => n,Hangup()

; -------------------------------------------------
; Invite Bermuda into conference 7000
; -------------------------------------------------
; Dial 7002, then enter 7-digit Bermuda subscriber number (no country code)
; e.g. 2362644 -> +14412362644
exten => 7002,1,NoOp(Invite Bermuda into conf 7000)
 same => n,Answer()
 same => n,Read(BDA7,beep,7,,3,10)
 same => n,ExecIf($[${LEN(${BDA7})}!=7]?Playback(pm-invalid-extension)&Hangup())
 same => n,Set(DEST=+1441${BDA7})
 same => n,Gosub(set-callerid,s,1)
 same => n,Dial(PJSIP/${DEST}@twilio-endpoint,90,gU(joinconf^s^1))
 same => n,Hangup()

; -------------------------------------------------
; Echo test (local media verification)
; -------------------------------------------------
exten => 6000,1,NoOp(Echo test)
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()

; -------------------------------------------------
; ODIN direct (point-to-point)
; -------------------------------------------------
exten => 6346,1,NoOp(ODIN voice agent - direct)
 same => n,Dial(PJSIP/6346@twilio-endpoint,60)
 same => n,Hangup()

; -------------------------------------------------
; RIZZY direct (point-to-point)
; -------------------------------------------------
exten => 7499,1,NoOp(RIZZY voice agent - direct)
 same => n,Dial(PJSIP/7499@twilio-endpoint,60)
 same => n,Hangup()

; -------------------------------------------------
; Include outbound calling LAST
; -------------------------------------------------
include => outbound

; ===================================================================
; Outbound calling context (Twilio PSTN)
; ===================================================================

[outbound]

; Block malformed E.164 attempts
exten => _+0.,1,NoOp(Blocked malformed E.164 attempt: ${EXTEN})
 same => n,Playback(ss-noservice)
 same => n,Hangup(403)

; E.164 numbers already in +<country><number> format
exten => _+X.,1,NoOp(Calling E.164 via Twilio: ${EXTEN})
 same => n,Set(DIAL_NUMBER=${EXTEN})
 same => n,Gosub(set-callerid,s,1)
 same => n,Dial(PJSIP/${DIAL_NUMBER}@twilio-endpoint,60)
 same => n,Hangup()

; International numbers dialled with 00 prefix -> + prefix
exten => _00X.,1,NoOp(Calling international via Twilio (00-prefix): ${EXTEN})
 same => n,Set(DIAL_NUMBER=+${EXTEN:2})
 same => n,Gosub(set-callerid,s,1)
 same => n,Dial(PJSIP/${DIAL_NUMBER}@twilio-endpoint,60)
 same => n,Hangup()

; Default deny
exten => _X.,1,NoOp(Blocked outbound attempt: ${EXTEN} from ${CALLERID(all)})
 same => n,Playback(ss-noservice)
 same => n,Hangup(403)

; ===================================================================
; Subroutines
; ===================================================================

[set-callerid]
exten => s,1,NoOp(Setting CallerID from env TWILIO_CALLERID (if present))
 same => n,Set(TWILIO_CID=${ENV(TWILIO_CALLERID)})
 same => n,ExecIf($[${LEN(${TWILIO_CID})} > 0]?Set(CALLERID(num)=${TWILIO_CID}))
 same => n,ExecIf($[${LEN(${TWILIO_CID})} > 0]?Set(CALLERID(name)=Twilio))
 same => n,Return()

[joinconf]
exten => s,1,NoOp(Joining answered callee into ConfBridge 7000)
 same => n,ConfBridge(7000,default_bridge,default_user)
 same => n,Hangup()

[joinconf-odin]
exten => s,1,NoOp(Joining ODIN into ConfBridge 7000)
 same => n,ConfBridge(7000,default_bridge,odin_user)
 same => n,Hangup()

; End of extensions.conf
