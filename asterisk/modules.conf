; modules.conf - Asterisk module load configuration
; -------------------------------------------------
; This file controls which Asterisk modules are loaded at start-up. For
; security and performance we aim to load only what we need, but we also want
; to respect the dependency resolution performed by the packaged Asterisk on
; Debian. The safest approach in this environment is:
;   - Enable autoload, so core and dependency modules are loaded as intended.
;   - Explicitly disable legacy or unused modules that we know we do not want
;     (e.g. chan_sip, DAHDI, MGCP, etc.).
;
; This avoids having to maintain an exhaustive list of `load =` lines (which
; can easily become inconsistent with the package’s expectations) whilst still
; reducing the attack surface.

[modules]

; ------------------------------
; Autoload behaviour
; ------------------------------
; Let Asterisk load modules automatically, resolving dependencies (including
; those for PJSIP and RTP) according to its own module metadata.

autoload=yes

; ------------------------------
; Disable legacy/unneeded modules
; ------------------------------
; The following modules are explicitly disabled either because they are not
; relevant in a SIP-only Twilio trunk deployment or because they broaden the
; attack surface unnecessarily. We rely on autoload for everything else.

noload = chan_sip.so             ; Legacy SIP channel driver (we use chan_pjsip).
noload = chan_iax2.so            ; IAX2 is not required for this deployment.
noload = chan_mgcp.so            ; MGCP gateway support not needed.
noload = chan_dahdi.so           ; DAHDI hardware interfaces not used.
noload = chan_oss.so             ; OSS sound card channel not required in a container.

; These modules are not needed for this project and may fail to load with the
; Debian-packaged Asterisk module set.
noload = pbx_ael.so              ; AEL dialplan language support (not used).
noload = res_pjsip_phoneprov_provider.so ; Phone provisioning provider (not used).
noload = chan_alsa.so            ; ALSA sound card channel (not used in container).

noload = res_phoneprov.so        ; Phone provisioning; out of scope here.
noload = res_snmp.so             ; SNMP agent; not required unless actively used.
noload = res_ael_share.so        ; AEL dialplan language; we use standard extensions.conf.

; TODO: As you expand the PBX feature set, revisit this list and add further
;       noload entries for modules you know you do not require, whilst
;       allowing Asterisk to manage loading order and dependencies.

; End of modules.conf
