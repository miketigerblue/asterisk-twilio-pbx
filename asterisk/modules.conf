; modules.conf - Asterisk module load configuration
; -------------------------------------------------
; This file controls which Asterisk modules are loaded at start-up. For
; security and performance we only load the modules we actually need for:
;   - Core PBX functionality.
;   - PJSIP channel handling for Twilio SIP trunking.
;   - RTP media handling.
;   - Basic logging and CLI support.
; Unused modules (such as DAHDI, MGCP, and phone provisioning) are disabled
; explicitly to reduce the attack surface.

[modules]
; ------------------------------
; Core modules
; ------------------------------
; Load essential core and utility modules required for Asterisk to function as
; a basic PBX.

load = res_musiconhold.so        ; Music on hold (optional but often useful).
load = res_rtp_asterisk.so       ; Core RTP media handling.
load = res_pjproject.so          ; PJPROJECT support library used by PJSIP.
load = res_pjsip.so              ; Core PJSIP support.
load = res_pjsip_authenticator_digest.so ; PJSIP digest authentication.
load = res_pjsip_endpoint_identifier_user.so ; Identify endpoints by user.
load = res_pjsip_outbound_registration.so   ; Registration support for PJSIP.
load = res_pjsip_outbound_publish.so        ; Outbound publish (not heavily used here but small).
load = res_pjsip_logger.so       ; SIP message logging (useful for debugging; disable if noisy).

load = chan_pjsip.so             ; PJSIP channel driver (required for Twilio).

load = pbx_config.so             ; Dialplan module for extensions.conf.

; Logging and CLI
load = logger.so                 ; Core logging subsystem.
load = res_clialiases.so         ; CLI aliases (quality-of-life feature).
load = res_crypto.so             ; Cryptographic helpers (future TLS/SRTP).

; ------------------------------
; Optional but commonly useful modules
; ------------------------------
; You may choose to enable voicemail, conferencing, etc., here. For this
; minimal outbound-only PBX we keep things simple and conservative.

;load = app_voicemail.so         ; Voicemail application (disabled by default).
;load = app_dial.so              ; Dial application (usually built-in).

; ------------------------------
; Disable legacy/unneeded modules
; ------------------------------
; The following loads are explicitly disabled either because they are not
; relevant in a SIP-only Twilio trunk deployment or because they broaden the
; attack surface unnecessarily.

noload = chan_sip.so             ; Legacy SIP channel driver (we use chan_pjsip).
noload = chan_iax2.so            ; IAX2 is not required for this deployment.
noload = chan_mgcp.so            ; MGCP gateway support not needed.
noload = chan_dahdi.so           ; DAHDI hardware interfaces not used.
noload = chan_oss.so             ; OSS sound card channel not required in a container.

noload = res_phoneprov.so        ; Phone provisioning; out of scope here.
noload = res_snmp.so             ; SNMP agent; not required unless actively used.
noload = res_ael_share.so        ; AEL dialplan language; we use standard extensions.conf.

; TODO: As you expand the PBX feature set, revisit this list and explicitly
;       load any additional applications or resources you require, keeping the
;       minimal principle in mind for security.

; End of modules.conf
