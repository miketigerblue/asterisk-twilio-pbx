; rtp.conf - RTP port range configuration
;
; IMPORTANT:
; - Docker/Compose port mappings must match the RTP range Asterisk actually uses.
; - This project publishes 10000-10100/udp, so we explicitly constrain RTP to
;   that range to avoid one-way/no-audio issues.
;
[general]
rtpstart=10000
rtpend=10100
